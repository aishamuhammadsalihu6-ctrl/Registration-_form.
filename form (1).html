<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form>

  <label>1. First Name:</label><br>
  <input type="text" name="first_name"><br><br>

  <label>2. Last Name:</label><br>
  <input type="text" name="last_name"><br><br>

  <label>3. Email Address:</label><br>
  <input type="email" name="email"><br><br>
  <label>4. Password:</label><br>
  <input type="password" name="password"><br><br>

  <label>5. Confirm Password:</label><br>
  <input type="password" name="confirm_password" ><br><br>


  <label>6. Phone Number:</label><br>
  <input type="tel" name="phone"><br><br>

  <label>7. Date of Birth:</label><br>
  <input type="date" name="dob"><br><br>
  
    <label>8. Previous School</label>
     <input type="text" name="Previous School"><br></br>

  <label>9. Country:</label><br>
  <input type="text" name="country"><br><br>

  <label>10. State:</label><br>
  <input type="text" name="State"><br><br>
  
  <label>11. Comment:</label><br>
  <input type="text" name="Comment"><br><br>
  
  <label>12. Upload file :</label><br>
  <input type="file" name="file"/*"><br><br>
   
   <button type="submit">submit</button>
</form>

</body>
</html>
